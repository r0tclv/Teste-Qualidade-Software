name: Testes Automatizados - CRUD Disciplinas

on:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install coverage

      - name: Executar testes BDD com cobertura
        run: |
          coverage run --source=app -m behave

      - name: Gerar relatorio de cobertura
        run: |
          coverage report -m
          coverage xml
          coverage json

      - name: Validar cobertura minima de 75%
        run: |
          TOTAL=$(coverage report --format=total)
          echo "Cobertura: ${TOTAL}%"
          if [ "$TOTAL" -lt 75 ]; then
            echo "FALHA: Cobertura ${TOTAL}% esta abaixo do minimo de 75%";
            exit 1;
          fi
          echo "SUCESSO: Cobertura ${TOTAL}% atende o minimo de 75%"
